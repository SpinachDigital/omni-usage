<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    
    <!-- Glowing cyan accent -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Purple accent -->
    <linearGradient id="purpleGlow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
    </pattern>

    <!-- Node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#00B4D8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="nodePurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#7C3AED" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Line animation dash -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glowing orbs -->
  <circle cx="200" cy="300" r="200" fill="url(#cyanGlow)"/>
  <circle cx="1000" cy="300" r="200" fill="url(#purpleGlow)"/>

  <!-- Network nodes and connections (AI gateway visualization) -->
  <g filter="url(#glow)">
    <!-- Central hub -->
    <circle cx="600" cy="310" r="65" fill="#0f172a" stroke="#00B4D8" stroke-width="2"/>
    <circle cx="600" cy="310" r="55" fill="url(#nodeGlow)"/>
    <text x="600" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="#00E5FF" font-weight="bold">OMNI</text>
    <text x="600" y="330" text-anchor="middle" font-family="monospace" font-size="11" fill="#00E5FF" font-weight="bold">ROUTE</text>

    <!-- Connected nodes -->
    <!-- Top left - Claude -->
    <circle cx="250" cy="180" r="40" fill="#0f172a" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="250" cy="180" r="32" fill="url(#nodePurple)"/>
    <text x="250" y="184" text-anchor="middle" font-family="monospace" font-size="9" fill="#D8B4FE" font-weight="bold">Claude</text>
    
    <!-- Top right - GPT -->
    <circle cx="950" cy="180" r="40" fill="#0f172a" stroke="#00B4D8" stroke-width="1.5"/>
    <circle cx="950" cy="180" r="32" fill="url(#nodeGlow)"/>
    <text x="950" y="184" text-anchor="middle" font-family="monospace" font-size="9" fill="#67E8F9" font-weight="bold">GPT-5</text>
    
    <!-- Mid left - Gemini -->
    <circle cx="150" cy="350" r="35" fill="#0f172a" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="150" cy="350" r="28" fill="url(#nodePurple)"/>
    <text x="150" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#D8B4FE" font-weight="bold">Gemini</text>
    
    <!-- Mid right - DeepSeek -->
    <circle cx="1050" cy="350" r="35" fill="#0f172a" stroke="#00B4D8" stroke-width="1.5"/>
    <circle cx="1050" cy="350" r="28" fill="url(#nodeGlow)"/>
    <text x="1050" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#67E8F9" font-weight="bold">DeepSeek</text>

    <!-- Bottom left - Grok -->
    <circle cx="300" cy="470" r="35" fill="#0f172a" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="300" cy="470" r="28" fill="url(#nodePurple)"/>
    <text x="300" y="474" text-anchor="middle" font-family="monospace" font-size="9" fill="#D8B4FE" font-weight="bold">Grok</text>
    
    <!-- Bottom right - Llama -->
    <circle cx="900" cy="470" r="35" fill="#0f172a" stroke="#00B4D8" stroke-width="1.5"/>
    <circle cx="900" cy="470" r="28" fill="url(#nodeGlow)"/>
    <text x="900" y="474" text-anchor="middle" font-family="monospace" font-size="9" fill="#67E8F9" font-weight="bold">Mistral</text>

    <!-- Connection lines between nodes and central hub -->
    <g stroke="#00B4D8" stroke-width="1" opacity="0.4" fill="none">
      <!-- Claude to center -->
      <path d="M290 180 C400 180 450 310 535 310" stroke="#7C3AED" opacity="0.5"/>
      <!-- GPT to center -->
      <path d="M910 180 C800 180 750 310 665 310" stroke="#00B4D8" opacity="0.5"/>
      <!-- Gemini to center -->
      <path d="M185 350 C300 350 400 310 535 310" stroke="#7C3AED" opacity="0.5"/>
      <!-- DeepSeek to center -->
      <path d="M1015 350 C900 350 800 310 665 310" stroke="#00B4D8" opacity="0.5"/>
      <!-- Grok to center -->
      <path d="M335 470 C400 470 450 400 535 340" stroke="#7C3AED" opacity="0.5"/>
      <!-- Mistral to center -->
      <path d="M865 470 C800 470 750 400 665 340" stroke="#00B4D8" opacity="0.5"/>
    </g>
    
    <!-- Animated data packets (small circles on paths) -->
    <circle cx="350" cy="200" r="4" fill="#D8B4FE" opacity="0.8">
      <animateMotion dur="3s" repeatCount="indefinite" path="M290 180 C400 180 450 310 535 310"/>
    </circle>
    <circle cx="850" cy="200" r="4" fill="#67E8F9" opacity="0.8">
      <animateMotion dur="3s" repeatCount="indefinite" path="M910 180 C800 180 750 310 665 310"/>
    </circle>
    <circle cx="420" cy="320" r="3" fill="#D8B4FE" opacity="0.8">
      <animateMotion dur="4s" repeatCount="indefinite" path="M185 350 C300 350 400 310 535 310"/>
    </circle>
    <circle cx="550" cy="420" r="3" fill="#67E8F9" opacity="0.8">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M335 470 C400 470 450 400 535 340"/>
    </circle>
  </g>

  <!-- Header Title -->
  <text x="600" y="80" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#64748b" letter-spacing="4" text-transform="uppercase">How I Built</text>
  <text x="600" y="125" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#f8fafc" letter-spacing="2">OmniRoute</text>
  
  <!-- Accent bar under title -->
  <rect x="420" y="140" width="360" height="3" rx="2" fill="url(#cyanGlow)"/>

  <!-- Feature badges at bottom -->
  <g transform="translate(100, 555)">
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="110" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00B4D8">🌐 237+ AI Providers</text>
    
    <rect x="250" y="0" width="200" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="350" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7C3AED">🆓 90+ Free Tiers</text>
    
    <rect x="480" y="0" width="240" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="600" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#22c55e">🔄 Smart Auto-Fallback</text>

    <rect x="750" y="0" width="200" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="850" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f59e0b">💰 95% Token Savings</text>
    
    <rect x="980" y="0" width="120" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1040" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ef4444">MIT</text>
  </g>

  <!-- GitHub URL -->
  <text x="600" y="620" text-anchor="middle" font-family="monospace" font-size="12" fill="#475569">github.com/SpinachDigital/omni-usage</text>
</svg>