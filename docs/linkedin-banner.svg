<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4D8" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  
  <!-- Glow overlay -->
  <rect width="1200" height="627" fill="url(#glow1)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#00B4D8" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="550" x2="1200" y2="550"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  
  <!-- Terminal window -->
  <rect x="60" y="60" width="1080" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Terminal title bar -->
  <rect x="60" y="60" width="1080" height="36" rx="12" fill="#0f172a"/>
  <rect x="60" y="84" width="1080" height="12" fill="#0f172a"/>
  <!-- Terminal dots -->
  <circle cx="90" cy="78" r="6" fill="#ef4444"/>
  <circle cx="110" cy="78" r="6" fill="#f59e0b"/>
  <circle cx="130" cy="78" r="6" fill="#22c55e"/>
  <text x="160" y="83" font-family="monospace" font-size="14" fill="#64748b">omni-usage widget --interval 30</text>
  
  <!-- Terminal content - simulated dashboard -->
  <g transform="translate(80, 110)">
    <!-- Box top -->
    <text font-family="monospace" font-size="14" fill="#475569">┌──────────────────────────────────────────────────────────────┐</text>
    <text y="22" font-family="monospace" font-size="14" fill="#00B4D8" font-weight="bold">│  ⚡ omni-usage  ·  v0.1.0                                       │</text>
    <text y="44" font-family="monospace" font-size="14" fill="#64748b">├──────────────────────────────────────────────────────────────┤</text>
    
    <!-- Stats columns -->
    <text y="66" font-family="monospace" font-size="13" fill="#f59e0b">│  ⏳ Session (5m)     📅 Today            📊 All Time        │</text>
    <text y="88" font-family="monospace" font-size="13" fill="#e2e8f0">│  Req 20             Req 473            Req 728             │</text>
    <text y="110" font-family="monospace" font-size="13" fill="#22c55e">│  Tok 5.8M           In  64.7M          ✓  475              │</text>
    <text y="132" font-family="monospace" font-size="13" fill="#ef4444">│                     Out 163K           ✗  253              │</text>
    
    <text y="154" font-family="monospace" font-size="13" fill="#64748b">├──────────────────────────────────────────────────────────────┤</text>
    <text y="176" font-family="monospace" font-size="14" fill="#e2e8f0">│  🤖 Models Used (by token volume)                            │</text>
    <text y="198" font-family="monospace" font-size="13" fill="#e2e8f0">│  big-pickle            425    69.0M    ✓                     │</text>
    <text y="220" font-family="monospace" font-size="13" fill="#e2e8f0">│  GPT_5_4                51     750K  ⚠14                     │</text>
  </g>

  <!-- Bottom section -->
  <g transform="translate(80, 300)">
    <text y="0" font-family="monospace" font-size="14" fill="#64748b">├──────────────────────────────────────────────────────────────┤</text>
    <text y="22" font-family="monospace" font-size="14" fill="#e2e8f0">│  🎯 Route Combos (by token volume)                           │</text>
    <text y="44" font-family="monospace" font-size="13" fill="#e2e8f0">│  auto/claude-opus            34.2M                           │</text>
    <text y="66" font-family="monospace" font-size="13" fill="#e2e8f0">│  auto/pro-coding             23.3M                           │</text>
    <text y="88" font-family="monospace" font-size="13" fill="#64748b">├──────────────────────────────────────────────────────────────┤</text>
    <text y="110" font-family="monospace" font-size="14" fill="#00B4D8">│  Now: auto/claude-opus  ·  🔥 96% cache saved  ·  Ctrl+C    │</text>
    <text y="132" font-family="monospace" font-size="14" fill="#475569">└──────────────────────────────────────────────────────────────┘</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="bold" fill="#f8fafc">omni-usage</text>
  <text x="600" y="456" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Token Usage Dashboard for OmniRoute</text>
  
  <!-- Accent line -->
  <rect x="400" y="478" width="400" height="3" rx="2" fill="url(#accent)"/>
  
  <!-- Feature pills -->
  <g transform="translate(150, 510)">
    <rect x="0" y="0" width="160" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="80" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00B4D8">⚡ Live TUI</text>
    <rect x="180" y="0" width="180" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="270" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7C3AED">🔍 Zero Dependencies</text>
    <rect x="380" y="0" width="200" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="480" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#22c55e">🔥 Cache Tracking</text>
    <rect x="600" y="0" width="200" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="700" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f59e0b">📊 Per-Model Stats</text>
    <rect x="820" y="0" width="150" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="895" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ef4444">🐍 Python</text>
  </g>
  
  <!-- GitHub link -->
  <text x="600" y="580" text-anchor="middle" font-family="monospace" font-size="14" fill="#475569">github.com/SpinachDigital/omni-usage</text>
</svg>